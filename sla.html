<!DOCTYPE html>
<html>
<head>
  <title>SLA Config</title>
  <style>
    body { font-family: Arial; padding: 20px; }

    h2 { margin-bottom: 10px; }

    .form-row {
      margin-bottom: 20px;
    }

    input {
      padding: 6px;
      margin-right: 10px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
      margin-right: 5px;
    }

    .edit-mode {
      color: green;
      margin-bottom: 10px;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: #f4f4f4;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .inactive {
      opacity: 0.4;
    }
  </style>
</head>
<body>

<h2>SLA Rules</h2>

<div id="editModeLabel" class="edit-mode"></div>

<div class="form-row">
  <input id="slaCarrier" placeholder="Carrier (FEDEX)" />
  <input id="slaService" placeholder="Service (UNKNOWN)" />
  <input id="slaDays" type="number" placeholder="Days" />

  <label>
    Active <input type="checkbox" id="slaActive" checked />
  </label>

  <button onclick="saveSlaRule()">Save</button>
  <button onclick="clearForm()">Clear</button>
</div>

<table id="slaTable">
  <thead>
    <tr>
      <th>Carrier</th>
      <th>Service</th>
      <th>SLA Days</th>
      <th>Active</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_BASE = "https://api.transportal.gr";

let editingId = null;
let slaRules = [];

// =======================
// LOAD + RENDER

async function loadSlaRules() {
  try {
    const res = await fetch(`${API_BASE}/api/v1/sla-rules`);
    slaRules = await res.json();

    const tbody = document.querySelector("#slaTable tbody");
    tbody.innerHTML = "";

    slaRules.forEach(r => {
      const tr = document.createElement("tr");

      if (r.is_active == 0) {
        tr.classList.add("inactive");
      }

      tr.innerHTML = `
        <td>${r.carrier}</td>
        <td>${r.service}</td>
        <td>${r.sla_days}</td>
        <td>${r.is_active ? "Yes" : "No"}</td>
        <td>
          <button onclick="event.stopPropagation(); toggleActive(${r.id}, ${r.is_active})">
            ${r.is_active ? "Deactivate" : "Activate"}
          </button>
        </td>
      `;

      tr.onclick = () => editSla(r);

      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error("SLA LOAD ERROR:", err);
  }
}

// =======================
// SAVE (CREATE / UPDATE)

async function saveSlaRule() {
  const carrier = document.getElementById("slaCarrier").value.trim().toUpperCase();
  const service = (document.getElementById("slaService").value.trim() || "UNKNOWN").toUpperCase();
  const sla_days = Number(document.getElementById("slaDays").value);
  const is_active = document.getElementById("slaActive").checked ? 1 : 0;

  if (!carrier || !sla_days) {
    alert("Carrier and SLA days are required");
    return;
  }

  // 🚫 Prevent duplicates
  const duplicate = slaRules.find(r =>
    r.carrier === carrier &&
    r.service === service &&
    r.id !== editingId
  );

  if (duplicate) {
    alert("Rule already exists for this carrier + service");
    return;
  }

  const payload = { carrier, service, sla_days, is_active };

  const url = editingId
    ? `${API_BASE}/api/v1/sla-rules/${editingId}`
    : `${API_BASE}/api/v1/sla-rules`;

  const method = editingId ? "PUT" : "POST";

  try {
    await fetch(url, {
      method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    editingId = null;
    clearForm();
    loadSlaRules();

  } catch (err) {
    console.error("SAVE SLA ERROR:", err);
  }
}

// =======================
// EDIT

function editSla(r) {
  editingId = r.id;

  document.getElementById("slaCarrier").value = r.carrier;
  document.getElementById("slaService").value = r.service;
  document.getElementById("slaDays").value = r.sla_days;
  document.getElementById("slaActive").checked = r.is_active == 1;

  document.getElementById("editModeLabel").innerText =
    `Editing: ${r.carrier} / ${r.service} (ID ${r.id})`;
}

// =======================
// CLEAR

function clearForm() {
  editingId = null;

  document.getElementById("slaCarrier").value = "";
  document.getElementById("slaService").value = "";
  document.getElementById("slaDays").value = "";
  document.getElementById("slaActive").checked = true;

  document.getElementById("editModeLabel").innerText = "";
}

// =======================
// ACTIVATE / DEACTIVATE

async function toggleActive(id, current) {
  const confirmMsg = current
    ? "Deactivate this rule?"
    : "Activate this rule?";

  if (!confirm(confirmMsg)) return;

  const rule = slaRules.find(r => r.id === id);
  if (!rule) return;

  try {
    await fetch(`${API_BASE}/api/v1/sla-rules/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...rule,
        is_active: current ? 0 : 1
      })
    });

    loadSlaRules();

  } catch (err) {
    console.error("TOGGLE ERROR:", err);
  }
}

// =======================
// INIT

loadSlaRules();
</script>

</body>
</html>
