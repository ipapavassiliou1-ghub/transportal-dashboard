<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Transportal SLA</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body {
  font-family: system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:28px;
}

/* HEADER */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1 { margin:0; font-size:30px; }

.subtitle {
  color:#6b7280;
  font-size:14px;
}

.btnGhost {
  padding:8px 12px;
  border-radius:10px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
  font-weight:600;
}

/* CONTROLS */
.controlsRow {
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
}

.pillClient {
  background:#eef2ff;
  color:#4f46e5;
  font-weight:700;
  padding:10px 16px;
  border-radius:14px;
}

/* FORM */
.card {
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

input {
  padding:8px;
  margin-right:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  padding:8px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.btnPrimary {
  background:#2563eb;
  color:white;
}

.btnSecondary {
  background:white;
  border:1px solid #ddd;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

th {
  text-align:left;
  font-size:13px;
  color:#6b7280;
}

tr:hover {
  background:#f9fafb;
}

.inactive {
  opacity:0.4;
}

/* FOOTER */
.footer {
  text-align:center;
  margin-top:40px;
  font-size:14px;
  color:#6b7280;
}

.footer .brand {
  color:#6d28d9;
  font-weight:800;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div>
    <h1>⚙ SLA Configuration</h1>
    <p class="subtitle">Define SLA rules per carrier</p>
  </div>

  <div style="display:flex; align-items:center; gap:12px;">
    <span id="userInfo"></span>
    <button onclick="goDashboard()" class="btnGhost">Dashboard</button>
    <button onclick="logout()" class="btnGhost">Logout</button>
  </div>
</div>

<!-- CLIENT -->
<div class="controlsRow">
  <div class="pillClient" id="clientDisplay">Client</div>
</div>

<!-- FORM -->
<div class="card">

  <div id="editModeLabel" style="color:#16a34a; font-weight:700; margin-bottom:10px;"></div>

  <input id="slaCarrier" placeholder="Carrier (FEDEX)" />
  <input id="slaService" placeholder="Service (STANDARD)" />
  <input id="slaDays" type="number" placeholder="Days" />

  <label>
    Active <input type="checkbox" id="slaActive" checked />
  </label>

  <button class="btnPrimary" onclick="saveSlaRule()">Save</button>
  <button class="btnSecondary" onclick="clearForm()">Clear</button>

</div>

<!-- TABLE -->
<div class="card">
  <table id="slaTable">
    <thead>
      <tr>
        <th>Carrier</th>
        <th>Service</th>
        <th>SLA Days</th>
        <th>Active</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- FOOTER -->
<div class="footer">
  powered by <span class="brand">transportal</span>
</div>

<script>

/* =============================
   🔐 AUTH PROTECTION
============================= */
function checkAuth() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "/login.html";
    return;
  }
}

/* =============================
   👤 USER HEADER
============================= */
function hydrateUserHeader() {
  document.getElementById("userInfo").textContent =
    "👤 " + (localStorage.getItem("user_email") || "Unknown");

  document.getElementById("clientDisplay").textContent =
    localStorage.getItem("display_name") || "Client";
}

/* =============================
   🔗 NAV
============================= */
function goDashboard() {
  window.location.href = "/dashboard.html";
}

function logout() {
  localStorage.clear();
  window.location.href = "/login.html";
}

/* =============================
   🌐 API CONFIG (AUTH!)
============================= */
const API_BASE = "https://api.transportal.gr";

function authFetch(url, options = {}) {
  return fetch(API_BASE + url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: "Bearer " + localStorage.getItem("token"),
      "x-api-key": localStorage.getItem("client_key"),
      "Content-Type": "application/json"
    }
  });
}

let editingId = null;
let slaRules = [];

/* =============================
   📥 LOAD SLA RULES
============================= */
async function loadSlaRules() {

  try {
    const res = await authFetch("/api/v1/sla-rules");

    if (!res.ok) {
      console.error("SLA LOAD FAILED:", res.status);
      return;
    }

    slaRules = await res.json();

    const tbody = document.querySelector("#slaTable tbody");
    tbody.innerHTML = "";

    slaRules.forEach(r => {
      const tr = document.createElement("tr");

      if (r.is_active == 0) {
        tr.classList.add("inactive");
      }

      tr.innerHTML = `
        <td>${r.carrier}</td>
        <td>${r.service}</td>
        <td>${r.sla_days}</td>
        <td>${r.is_active ? "Yes" : "No"}</td>
        <td>
          <button onclick="event.stopPropagation(); toggleActive(${r.id}, ${r.is_active})">
            ${r.is_active ? "Deactivate" : "Activate"}
          </button>
        </td>
      `;

      tr.onclick = () => editSla(r);

      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error("SLA LOAD ERROR:", err);
  }
}

/* =============================
   💾 SAVE SLA
============================= */
async function saveSlaRule() {

  const carrier = document.getElementById("slaCarrier").value.trim().toUpperCase();
  const service = (document.getElementById("slaService").value.trim() || "STANDARD").toUpperCase();
  const sla_days = Number(document.getElementById("slaDays").value);
  const is_active = document.getElementById("slaActive").checked ? 1 : 0;

  if (!carrier || !sla_days) {
    alert("Carrier and SLA days are required");
    return;
  }

  const duplicate = slaRules.find(r =>
    r.carrier === carrier &&
    r.service === service &&
    r.id !== editingId
  );

  if (duplicate) {
    alert("Rule already exists");
    return;
  }

  const payload = { carrier, service, sla_days, is_active };

  const url = editingId
    ? `/api/v1/sla-rules/${editingId}`
    : `/api/v1/sla-rules`;

  const method = editingId ? "PUT" : "POST";

  await authFetch(url, {
    method,
    body: JSON.stringify(payload)
  });

  editingId = null;
  clearForm();
  loadSlaRules();
}

/* =============================
   ✏ EDIT
============================= */
function editSla(r) {
  editingId = r.id;

  document.getElementById("slaCarrier").value = r.carrier;
  document.getElementById("slaService").value = r.service;
  document.getElementById("slaDays").value = r.sla_days;
  document.getElementById("slaActive").checked = r.is_active == 1;

  document.getElementById("editModeLabel").innerText =
    `Editing: ${r.carrier} / ${r.service}`;
}

/* =============================
   🔄 CLEAR
============================= */
function clearForm() {
  editingId = null;

  document.getElementById("slaCarrier").value = "";
  document.getElementById("slaService").value = "";
  document.getElementById("slaDays").value = "";
  document.getElementById("slaActive").checked = true;

  document.getElementById("editModeLabel").innerText = "";
}

/* =============================
   🔁 TOGGLE ACTIVE
============================= */
async function toggleActive(id, current) {

  const rule = slaRules.find(r => r.id === id);
  if (!rule) return;

  await authFetch(`/api/v1/sla-rules/${id}`, {
    method: "PUT",
    body: JSON.stringify({
      ...rule,
      is_active: current ? 0 : 1
    })
  });

  loadSlaRules();
}

/* =============================
   🚀 INIT
============================= */
checkAuth();
hydrateUserHeader();
loadSlaRules();

</script>

</body>
</html>
