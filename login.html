<!DOCTYPE html>
<html>
<head>
  <title>Transportal Login</title>

  <!-- ✅ MOBILE SUPPORT -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      /* Background */
      background: linear-gradient(
        rgba(255,255,255,0.75),
        rgba(255,255,255,0.85)
      ),
      url("https://images.unsplash.com/photo-1578575437130-527eed3abbec?q=80&w=1974&auto=format&fit=crop");

      background-size: cover;
      background-position: center;

      color: #0f172a;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
    }

    .login-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(6px);

      padding: 40px 32px;
      border-radius: 12px;

      width: 320px;
      max-width: 90%;

      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;

      border-radius: 8px;
      border: 1px solid #cbd5e1;

      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;

      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;

      border: 1px solid transparent;
      border-radius: 8px;

      font-weight: bold;
      cursor: pointer;

      transition: 0.2s;
      box-sizing: border-box;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .error {
      margin-top: 12px;
      font-size: 13px;
      color: #dc2626;
      display: none;
    }

    /* 🔥 FOOTER (matches your app style) */
    .powered {
      position: fixed;
      bottom: 20px;
      font-size: 14px;
      color: #6b7280;
    }

    .powered span {
      color: #6d28d9;
      font-weight: bold;
      font-size: 18px;
    }

    /* ✅ MOBILE TWEAKS */
    @media (max-width: 480px) {
      .login-card {
        padding: 30px 20px;
      }

      .logo {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="login-card">

    <div class="logo">transportal</div>
    <div class="subtitle">Operations Control Tower</div>

    <input id="email" placeholder="Email address" />
    <input id="password" type="password" placeholder="Password" />

    <button id="loginBtn" onclick="login()">Login</button>

    <div id="errorMsg" class="error"></div>

    <div class="subtitle" style="margin-top:20px;">
      Secure access for logistics clients
    </div>

  </div>

  <!-- 🔥 BOTTOM FOOTER -->
  <div class="powered">
    powered by <span>transportal</span>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("loginBtn");
      const errorEl = document.getElementById("errorMsg");

      errorEl.style.display = "none";
      errorEl.textContent = "";

      if (!email || !password) {
        errorEl.textContent = "Please enter email and password";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Logging in...";

      try {
        const res = await fetch("https://api.transportal.gr/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        let data = null;

        try {
          data = await res.json();
        } catch (e) {
          throw new Error("Invalid server response");
        }

        if (data.success) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("client_key", data.user.client_key);
          localStorage.setItem("user_email", data.user.email);

          window.location.href = "/dashboard.html";
        } else {
          errorEl.textContent = "Invalid email or password";
          errorEl.style.display = "block";
        }

      } catch (err) {
        console.error(err);
        errorEl.textContent = "Connection error. Please try again.";
        errorEl.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Login";
    }
  </script>

</body>
</html>
