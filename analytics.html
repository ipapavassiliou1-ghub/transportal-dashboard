<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Transportal Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
/* ✅ REUSE SAME STYLE (copy from dashboard) */
body {
  font-family: system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:28px;
}

/* header */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1 { margin:0; font-size:30px; }

.btnBack {
  background:#2563eb;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

/* cards */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:16px;
}

.card {
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.value {
  font-size:28px;
  font-weight:900;
}

.sub {
  font-size:13px;
  color:#6b7280;
}

/* carriers */
.carrier {
  margin-top:20px;
}

.bar {
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  background:#6d28d9;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div>
    <h1>📊 Analytics</h1>
    <div style="color:#6b7280;">Performance insights & KPIs</div>
  </div>

  <button class="btnBack" onclick="goBack()">← Back to Dashboard</button>
</div>

<!-- KPI -->
<div class="grid">

  <div class="card">
    <div class="value" id="totalShipments">0</div>
    <div class="sub">Distinct Shipments</div>
  </div>

  <div class="card">
    <div class="value" id="delivered">0</div>
    <div class="sub">Delivered</div>
  </div>

  <div class="card">
    <div class="value" id="late">0</div>
    <div class="sub">Delivered Late</div>
  </div>

  <div class="card">
    <div class="value" id="delayed">0</div>
    <div class="sub">In Delay</div>
  </div>

  <div class="card">
    <div class="value" id="success">0%</div>
    <div class="sub">Success Rate</div>
  </div>

</div>

<!-- Carrier -->
<div class="carrier">
  <h2>Carrier Performance</h2>
  <div id="carrierBox"></div>
</div>

<script>

/* =============================
   SAME CONFIG AS DASHBOARD
============================= */
const API_V1 = "https://api.transportal.gr/api/v1";

function authFetch(url, options = {}) {
  const token = localStorage.getItem("token");
  const clientKey = localStorage.getItem("client_key");

  return fetch(API_V1 + url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: "Bearer " + token,
      "x-api-key": clientKey
    }
  });
}

/* =============================
   LOAD DATA
============================= */
async function loadAnalytics() {

  const res = await authFetch("/shipments");
  const data = await res.json();

  console.log("Analytics data:", data);

  /* =============================
     🔥 COUNT DISTINCT (CRITICAL)
  ============================= */
  const unique = {};
  data.forEach(s => {
    unique[s.tracking] = s;
  });

  const shipments = Object.values(unique);

  /* =============================
     KPI
  ============================= */
  const total = shipments.length;

  const delivered = shipments.filter(s =>
    s.normalized_status === "delivered"
  ).length;

  const late = shipments.filter(s => s.delay_status === 2).length;

  const delayed = shipments.filter(s => s.delay_status === 1).length;

  const success = total ? Math.round((delivered / total) * 100) : 0;

  document.getElementById("totalShipments").textContent = total;
  document.getElementById("delivered").textContent = delivered;
  document.getElementById("late").textContent = late;
  document.getElementById("delayed").textContent = delayed;
  document.getElementById("success").textContent = success + "%";

  /* =============================
     CARRIER
  ============================= */
  const carriers = {};

  shipments.forEach(s => {
    const c = s.carrier || "UNKNOWN";
    if (!carriers[c]) carriers[c] = { total:0, delivered:0 };

    carriers[c].total++;
    if (s.normalized_status === "delivered") carriers[c].delivered++;
  });

  const box = document.getElementById("carrierBox");
  box.innerHTML = "";

  Object.entries(carriers).forEach(([name,val]) => {

    const pct = val.total ? Math.round((val.delivered / val.total)*100) : 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${name}</b> (${val.total})
      <div class="bar">
        <div class="fill" style="width:${pct}%"></div>
      </div>
      <div class="sub">${val.delivered} delivered • ${pct}%</div>
    `;

    box.appendChild(div);
  });

}

/* =============================
   NAVIGATION
============================= */
function goBack() {
  window.location.href = "/dashboard.html";
}

/* =============================
   INIT
============================= */
loadAnalytics();

</script>

</body>
</html>
