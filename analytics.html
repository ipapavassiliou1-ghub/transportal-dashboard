<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Transportal Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:28px;
}

/* HEADER */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1 { margin:0; font-size:30px; }

.subtitle {
  color:#6b7280;
  font-size:14px;
}

.btnGhost {
  padding:8px 12px;
  border-radius:10px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
  font-weight:600;
}

/* CONTROLS */
.controlsRow {
  display:flex;
  align-items:center;
  gap:14px;
  margin-top:20px;
  margin-bottom:20px;
}

.pillClient {
  background:#eef2ff;
  color:#4f46e5;
  font-weight:700;
  padding:10px 16px;
  border-radius:14px;
}

.pillControl {
  display:flex;
  align-items:center;
  gap:10px;
  background:white;
  border:1px solid #e5e7eb;
  padding:10px 14px;
  border-radius:14px;
}

.pillControl .label {
  font-size:13px;
  color:#6b7280;
}

.pillControl select {
  border:none;
  outline:none;
  font-weight:600;
  background:transparent;
  cursor:pointer;
}

.pillButton {
  background:white;
  border:1px solid #e5e7eb;
  padding:10px 16px;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
}

.pillButton:hover {
  background:#f9fafb;
}

/* KPI */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:16px;
}

.card {
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.value {
  font-size:28px;
  font-weight:900;
}

.sub {
  font-size:13px;
  color:#6b7280;
}

h2 {
  margin-top:30px;
}

/* FOOTER */
.footer {
  text-align:center;
  margin-top:40px;
  font-size:14px;
  color:#6b7280;
}

.footer .brand {
  color:#6d28d9;
  font-weight:800;
}

canvas {
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div>
    <h1>📊 Operations Control Tower</h1>
    <p class="subtitle">Analytics & performance insights</p>
  </div>

  <div style="display:flex; align-items:center; gap:12px;">
    <span id="userInfo"></span>
    <button onclick="goDashboard()" class="btnGhost">Dashboard</button>
    <button onclick="logout()" class="btnGhost">Logout</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="controlsRow">
  <div class="pillClient" id="clientDisplay">Sky Logistics</div>

  <div class="pillControl">
    <span class="label">Time Scope</span>
    <select id="timeScope">
      <option value="7">Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="all">All time</option>
    </select>
  </div>

  <button id="refreshBtn" class="pillButton">Refresh</button>
</div>

<!-- KPI -->
<h2>Analytics</h2>

<div class="grid">
  <div class="card"><div class="value" id="totalShipments">0</div><div class="sub">Distinct Shipments</div></div>
  <div class="card"><div class="value" id="delivered">0</div><div class="sub">Delivered</div></div>
  <div class="card"><div class="value" id="late">0</div><div class="sub">Late Deliveries</div></div>
  <div class="card"><div class="value" id="delayed">0</div><div class="sub">Active Delays</div></div>
  <div class="card"><div class="value" id="success">0%</div><div class="sub">Success Rate</div></div>
</div>

<!-- CHARTS -->
<h2>Visual Analytics</h2>

<div class="grid">
  <div class="card">
    <h3>Carrier Performance</h3>
    <canvas id="carrierChart"></canvas>
  </div>

  <div class="card">
    <h3>SLA Performance</h3>
    <canvas id="slaChart"></canvas>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  powered by <span class="brand">transportal</span>
</div>

<script>

/* =====================================
   🔹 NAVIGATION
===================================== */
function goDashboard() {
  window.location.href = "/dashboard.html";
}

function logout() {
  localStorage.clear();
  window.location.href = "/login.html";
}


/* =====================================
   🔹 USER HEADER (CLIENT + USER INFO)
===================================== */
function hydrateUserHeader() {
  document.getElementById("userInfo").textContent =
    "👤 " + (localStorage.getItem("user_email") || "Unknown");

  document.getElementById("clientDisplay").textContent =
    localStorage.getItem("display_name") || "Client";
}

hydrateUserHeader();


/* =====================================
   🔹 API CONFIG (AUTH FETCH)
===================================== */
const API_V1 = "https://api.transportal.gr/api/v1";

function authFetch(url) {
  return fetch(API_V1 + url, {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token"),
      "x-api-key": localStorage.getItem("client_key")
    }
  });
}


/* =====================================
   🔹 GLOBAL CHART REFERENCES
===================================== */
let carrierChart = null;
let slaChart = null;


/* =====================================
   🔹 UI EVENTS (REFRESH / TIME SCOPE)
===================================== */
document.getElementById("refreshBtn").addEventListener("click", loadAnalytics);
document.getElementById("timeScope").addEventListener("change", loadAnalytics);


/* =====================================
   🔹 STATUS HELPERS
===================================== */
function isDelivered(s) {
  return (
    s.final_status === "delivered" ||
    s.normalized_status === "delivered" ||
    String(s.status || "").toLowerCase() === "delivered"
  );
}


/* =====================================
   🔹 MAIN ANALYTICS LOADER
===================================== */
async function loadAnalytics() {

  /* ---- Fetch data ---- */
  const res = await authFetch("/shipments");

  if (!res.ok) {
    console.error("Analytics API failed:", res.status);
    return;
  }

  const data = await res.json();
  console.log("Analytics data:", data);


  /* ---- DISTINCT shipments (by tracking) ---- */
  const unique = {};
  data.forEach(s => {
    if (s.tracking) unique[s.tracking] = s;
  });

  const shipments = Object.values(unique);


  /* =====================================
     🔹 KPI CALCULATIONS
  ===================================== */
  const total = shipments.length;
  const delivered = shipments.filter(isDelivered).length;
  const late = shipments.filter(s => Number(s.delay_status) === 2).length;
  const delayed = shipments.filter(s => Number(s.delay_status) === 1).length;

  const success = total ? Math.round((delivered / total) * 100) : 0;


  /* ---- Update KPI UI ---- */
  document.getElementById("totalShipments").textContent = total;
  document.getElementById("delivered").textContent = delivered;
  document.getElementById("late").textContent = late;
  document.getElementById("delayed").textContent = delayed;
  document.getElementById("success").textContent = success + "%";


  /* =====================================
     🔹 CARRIER AGGREGATION
  ===================================== */
  const carriers = {};

  shipments.forEach(s => {
    const c = s.carrier || "UNKNOWN";

    if (!carriers[c]) {
      carriers[c] = { total: 0, delivered: 0 };
    }

    carriers[c].total++;

    if (isDelivered(s)) {
      carriers[c].delivered++;
    }
  });


  /* =====================================
     🔹 CHART RESET (IMPORTANT)
  ===================================== */
  if (carrierChart) carrierChart.destroy();
  if (slaChart) slaChart.destroy();


  /* =====================================
     🔹 CARRIER PERFORMANCE CHART (BAR)
  ===================================== */
  const carrierLabels = [];
  const carrierData = [];

  Object.entries(carriers).forEach(([name, val]) => {
    carrierLabels.push(name);

    const pct = val.total
      ? Math.round((val.delivered / val.total) * 100)
      : 0;

    carrierData.push(pct);
  });

  carrierChart = new Chart(
    document.getElementById("carrierChart"),
    {
      type: "bar",
      data: {
        labels: carrierLabels,
        datasets: [{
          label: "% Delivered",
          data: carrierData
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: {
            beginAtZero: true,
            max: 100
          }
        }
      }
    }
  );


  /* =====================================
     🔹 SLA PERFORMANCE CHART (PIE)
  ===================================== */
  const onTime = Math.max(0, delivered - late);

  slaChart = new Chart(
    document.getElementById("slaChart"),
    {
      type: "pie",
      data: {
        labels: ["On Time", "Late"],
        datasets: [{
          data: [onTime, late]
        }]
      },
      options: {
        responsive: true
      }
    }
  );

}


/* =====================================
   🔹 INITIAL LOAD
===================================== */
loadAnalytics();

</script>

</body>
</html>
