<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Transportal Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body {
  font-family: system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:28px;
}

/* HEADER */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1 { margin:0; font-size:30px; }

.subtitle {
  color:#6b7280;
  font-size:14px;
}

.btnGhost {
  padding:8px 12px;
  border-radius:10px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
  font-weight:600;
}

/* CONTROLS */
.controlsRow {
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:20px;
}

.control label {
  font-size:12px;
  color:#6b7280;
  display:block;
}

.clientName {
  font-weight:700;
  font-size:18px;
}

/* KPI */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:16px;
}

.card {
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.value {
  font-size:28px;
  font-weight:900;
}

.sub {
  font-size:13px;
  color:#6b7280;
}

/* CARRIER */
.carrier {
  margin-top:30px;
}

.bar {
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  background:#6d28d9;
}

/* FOOTER */
.footer {
  text-align:center;
  margin-top:40px;
  font-size:14px;
  color:#6b7280;
}

.footer .brand {
  color:#6d28d9;
  font-weight:800;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div>
    <h1>📊 Operations Control Tower</h1>
    <p class="subtitle">Analytics & performance insights</p>
  </div>

  <div style="display:flex; align-items:center; gap:12px;">
    <span id="userInfo"></span>

    <button onclick="goDashboard()" class="btnGhost">Dashboard</button>
    <button onclick="logout()" class="btnGhost">Logout</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="controlsRow">

  <div class="clientName" id="clientDisplay"></div>

  <div class="control">
    <label>Time Scope</label>
    <select id="timeScope">
      <option value="7">Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="all">All time</option>
    </select>
  </div>

  <button id="refreshBtn" class="btnGhost">Refresh</button>

</div>

<!-- KPI -->
<h2 style="margin-top:20px;">Analytics</h2>
  
<div class="grid">

  <div class="card">
    <div class="value" id="totalShipments">0</div>
    <div class="sub">Distinct Shipments</div>
  </div>

  <div class="card">
    <div class="value" id="delivered">0</div>
    <div class="sub">Delivered</div>
  </div>

  <div class="card">
    <div class="value" id="late">0</div>
    <div class="sub">Delivered Late</div>
  </div>

  <div class="card">
    <div class="value" id="delayed">0</div>
    <div class="sub">In Delay</div>
  </div>

  <div class="card">
    <div class="value" id="success">0%</div>
    <div class="sub">Success Rate</div>
  </div>

</div>

<!-- CARRIER -->
<div class="carrier">
  <h2>Carrier Performance</h2>
  <div id="carrierBox"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  powered by <span class="brand">transportal</span>
</div>

<!-- ================= JS ================= -->
<script>

/* NAVIGATION */
function goDashboard() {
  window.location.href = "/dashboard.html";
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("client_key");
  localStorage.removeItem("user_email");
  localStorage.removeItem("display_name");
  window.location.href = "/login.html";
}

/* USER HEADER */
function hydrateUserHeader() {
  const userEmail = localStorage.getItem("user_email") || "Unknown";
  const displayName = localStorage.getItem("display_name") || "Client";

  document.getElementById("userInfo").textContent = "👤 " + userEmail;
  document.getElementById("clientDisplay").textContent = displayName;
}

hydrateUserHeader();

/* EVENTS */
document.getElementById("refreshBtn").addEventListener("click", loadAnalytics);
document.getElementById("timeScope").addEventListener("change", loadAnalytics);

/* API */
const API_V1 = "https://api.transportal.gr/api/v1";

function authFetch(url, options = {}) {
  const token = localStorage.getItem("token");
  const clientKey = localStorage.getItem("client_key");

  return fetch(API_V1 + url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: "Bearer " + token,
      "x-api-key": clientKey
    }
  });
}

/* LOAD DATA */
async function loadAnalytics() {

  const res = await authFetch("/shipments");
  const data = await res.json();

  const unique = {};
  data.forEach(s => unique[s.tracking] = s);

  const shipments = Object.values(unique);

  const total = shipments.length;
  const delivered = shipments.filter(s => s.normalized_status === "delivered").length;
  const late = shipments.filter(s => s.delay_status === 2).length;
  const delayed = shipments.filter(s => s.delay_status === 1).length;

  const success = total ? Math.round((delivered / total) * 100) : 0;

  document.getElementById("totalShipments").textContent = total;
  document.getElementById("delivered").textContent = delivered;
  document.getElementById("late").textContent = late;
  document.getElementById("delayed").textContent = delayed;
  document.getElementById("success").textContent = success + "%";

  /* CARRIER */
  const carriers = {};

  shipments.forEach(s => {
    const c = s.carrier || "UNKNOWN";
    if (!carriers[c]) carriers[c] = { total:0, delivered:0 };

    carriers[c].total++;
    if (s.normalized_status === "delivered") carriers[c].delivered++;
  });

  const box = document.getElementById("carrierBox");
  box.innerHTML = "";

  Object.entries(carriers).forEach(([name,val]) => {

    const pct = val.total ? Math.round((val.delivered / val.total)*100) : 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${name}</b> (${val.total})
      <div class="bar">
        <div class="fill" style="width:${pct}%"></div>
      </div>
      <div class="sub">${val.delivered} delivered • ${pct}%</div>
    `;

    box.appendChild(div);
  });

}

/* INIT */
loadAnalytics();

</script>

</body>
</html>
